<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact | Minimalist Monolith</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header class="mono-header">
        <nav class="mono-navbar">
            <div class="site-id">Hamiu Jamilu // ACADEMIC</div>
            <ul class="mono-nav-links">
                <li><a href="index.html">HOME</a></li>
                <li><a href="about.html">PROFILE</a></li>
                <li><a href="projects.html">WORK</a></li>
                <li><a href="planner.html">PLANNER</a></li>
                <li><a href="contact.html" class="active">CONTACT</a></li>
            </ul>
        </nav>
    </header>

    <main class="mono-container slim-width">
        <h2 class="mono-page-title">COMMUNICATION PIPELINE</h2>
        
        <form id="monoValidationForm" class="mono-form" novalidate>
            <div id="monoErrorDisplay" class="mono-alert-banner hide-element"></div>

            <div class="mono-control-group">
                <label for="monoNameField">IDENTIFICATION NAME</label>
                <input type="text" id="monoNameField" placeholder="Provide complete sequence">
            </div>

            <div class="mono-control-group">
                <label for="monoEmailField">ELECTRONIC MAIL ADDR</label>
                <input type="email" id="monoEmailField" placeholder="user@domain.xyz">
            </div>

            <div class="mono-control-group">
                <label for="monoPhoneField">TELEPHONY DIGIT CHAIN</label>
                <input type="tel" id="monoPhoneField" placeholder="Absolute whole numbers only">
            </div>

            <div class="mono-control-group">
                <label for="monoMessageField">PLAINTEXT CONTEXT</label>
                <textarea id="monoMessageField" rows="4" placeholder="Type contextual message payload here..."></textarea>
            </div>

            <button type="submit" class="mono-btn primary block-layout-btn">EXECUTE VERIFIED SEND</button>
        </form>
    </main>

    <footer class="mono-footer">
        <p>&copy; 2026 Hamiu Jamilu.</p>
    </footer>

    <script src="contact.js"></script>
</body>
</html>
